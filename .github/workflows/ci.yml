name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: python -m pip install --upgrade pip ruff
      - name: Ruff format
        run: python -m ruff format --check decision_proof tests
      - name: Ruff lint
        run: python -m ruff check decision_proof tests
      - name: Run golden tests
        run: python -m unittest discover -s tests
      - name: Validate example IR
        run: python -m decision_proof.cli validate examples/car-decision.json
      - name: Validate graduate-school IR
        run: python -m decision_proof.cli validate examples/graduate-school-decision.json
      - name: Validate rent-vs-buy IR
        run: python -m decision_proof.cli validate examples/rent-vs-buy-decision.json
      - name: Evaluate generic runtime entrypoint
        run: |
          python -m decision_proof.cli evaluate examples/car-decision.json
          python -m decision_proof.cli evaluate examples/graduate-school-decision.json
          python -m decision_proof.cli evaluate examples/rent-vs-buy-decision.json
      - name: Generate report and diff smoke test
        run: |
          python -m decision_proof.cli report examples/car-decision.json --run-id run_unknown --json-out /tmp/run_unknown.json --md-out /tmp/run_unknown.md
          python -m decision_proof.cli report examples/car-decision-value-time-100.json --run-id run_value_time_100 --json-out /tmp/run_value_time_100.json --md-out /tmp/run_value_time_100.md
          python -m decision_proof.cli report examples/graduate-school-decision.json --run-id run_grad --json-out /tmp/run_grad.json --md-out /tmp/run_grad.md
          python -m decision_proof.cli report examples/rent-vs-buy-decision.json --run-id run_rvb --json-out /tmp/run_rvb.json --md-out /tmp/run_rvb.md
          python -m decision_proof.cli diff /tmp/run_unknown.json /tmp/run_value_time_100.json
      - name: Flagship rent-vs-buy demo and verify
        run: |
          python -m decision_proof.cli demo rent-vs-buy
          python -m decision_proof.cli verify examples/rent-vs-buy-decision.json
      - name: Domain pack validate (strict) and golden tests
        run: |
          python -m decision_proof.cli domain-validate decision_proof/domains/rent_vs_buy --strict
          python -m decision_proof.cli domain-test decision_proof/domains/rent_vs_buy
      - name: Evaluate multi-option car scenario
        run: python -m decision_proof.cli evaluate examples/car-options-comparison.json

  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and install
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install dist/*.whl
      - name: Console command works after install (no repo context)
        run: |
          cd /tmp
          decision-proof demo rent-vs-buy
          decision-proof domain-test "$(python -c 'import decision_proof.domains.rent_vs_buy as m, os; print(os.path.dirname(m.__file__))')"
