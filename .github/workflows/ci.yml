name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run golden tests
        run: python -m unittest discover -s tests
      - name: Validate example IR
        run: python scripts/validate_ir.py examples/car-decision.json
